    <div style={{background:'var(--moss)',color:'var(--cream)',padding:'24px 0',overflow:'hidden',backgroundImage:ANDEAN}}>

// ---------- RESPIRA · DESCANSA · VUELVE ----------
function Respira() {
  const [step, setStep] = useState(0);
  React.useEffect(() => {
    const id = setInterval(() => setStep(s => (s + 1) % 3), 3800);
    return () => clearInterval(id);
  }, []);
  const words = ['respira', 'descansa', 'vuelve'];
  const subs  = [
    'el aire del valle a 1500 m',
    'no hay prisa en Vilcabamba',
    'a ti, a los tuyos, a la tierra',
  ];
  return (
    <section style={{
      background:'var(--moss-deep)', color:'var(--cream)',
      padding:'140px 48px', position:'relative', overflow:'hidden',
    }}>
      <div style={{
        position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center',
        pointerEvents:'none',
      }}>
        <div style={{
          width:520, height:520, borderRadius:'50%',
          background:'radial-gradient(circle, rgba(201,167,102,0.12) 0%, transparent 70%)',
          animation:'breathe 7.6s ease-in-out infinite',
        }}/>
      </div>
      <div style={{maxWidth:1200, margin:'0 auto', textAlign:'center', position:'relative'}}>
        <div style={{fontFamily:'var(--mono)',fontSize:11,letterSpacing:3,textTransform:'uppercase',color:'var(--gold-soft)',marginBottom:48}}>
          · una pausa ·
        </div>
        <div style={{display:'flex',justifyContent:'center',gap:48,flexWrap:'wrap',marginBottom:56}}>
          {words.map((w,i) => (
            <div key={w} style={{
              fontFamily:'var(--display-it)', fontStyle:'italic',
              fontSize: step===i ? 96 : 64,
              fontWeight:400,
              color: step===i ? 'var(--gold)' : 'rgba(236,228,211,0.28)',
              transition:'all 1.2s cubic-bezier(.4,0,.2,1)',
              letterSpacing:-2,
              lineHeight:1,
            }}>
              {w}
            </div>
          ))}
        </div>
        <div style={{
          fontFamily:'var(--display)', fontSize:22, fontWeight:400,
          color:'rgba(236,228,211,0.7)', minHeight:32,
          transition:'opacity .6s',
        }} key={step}>
          <span style={{animation:'fadeIn 1.2s ease-out'}}>{subs[step]}</span>
        </div>
        <div style={{display:'flex',justifyContent:'center',gap:10,marginTop:56}}>
          {words.map((_,i)=>(
            <span key={i} style={{
              width: step===i?28:8, height:2,
              background: step===i?'var(--gold)':'rgba(236,228,211,0.25)',
              transition:'all .6s',
            }}/>
          ))}
        </div>
      </div>
      <style>{`
        @keyframes breathe {
          0%, 100% { transform: scale(0.85); opacity: 0.5; }
          50%      { transform: scale(1.15); opacity: 1;   }
        }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(8px); }
          to   { opacity: 1; transform: translateY(0); }
        }
      `}</style>
    </section>
  );
}
